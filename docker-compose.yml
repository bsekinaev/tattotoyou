name: tattutuy

x-app-environment: &app-environment
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: ${POSTGRES_DB:-tattoo_assistant}
  POSTGRES_USER: ${POSTGRES_USER:-tattoo_user}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_DB: ${REDIS_DB:-0}
  REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}

x-app-service: &app-service
  build:
    context: .
    dockerfile: Dockerfile
  image: tattutuy-app:${APP_VERSION:-0.1.0}
  env_file:
    - .env
  environment:
    <<: *app-environment
  networks:
    - backend

services:
  postgres:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tattoo_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-tattoo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - backend

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - sh
      - -c
      - exec redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli --no-auth-warning -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - backend

  migrate:
    <<: *app-service
    command: alembic upgrade head
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    <<: *app-service
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    expose:
      - "8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    <<: *app-service
    command: celery -A app.workers.celery_app worker --loglevel=info
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:

networks:
  backend:
    driver: bridge
